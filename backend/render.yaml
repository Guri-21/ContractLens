services:
  - type: web
    name: contractlens-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements-prod.txt && prisma generate && prisma py fetch && prisma db push --accept-data-loss && python setup_db.py
    startCommand: prisma py fetch && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # Supabase Transaction pooler URL (port 6543)
      - key: DIRECT_DATABASE_URL
        sync: false          # Supabase Direct connection URL (port 5432)
      - key: JWT_SECRET_KEY
        sync: false
      - key: GROK_API_KEY
        sync: false
      - key: GROK_API_KEY_2
        sync: false
      - key: CORS_ALLOW_ORIGINS
        sync: false          # set to your Vercel frontend URL once deployed
      - key: ENABLE_DEMO_USERS
        value: "true"
      - key: LLM_REDACTION
        value: "true"
      - key: CLASSIFY_OTHER_WITH_LLM
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11"
      - key: JINA_API_KEY
        sync: false          # free key from jina.ai (1M tokens, no credit card)
